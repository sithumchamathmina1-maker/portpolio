<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: linear-gradient(135deg, #020617, #0f172a);
    scroll-behavior: smooth;
}

.navbar {
    position: sticky;
    top: 0;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    z-index: 1000;
}

.nav-links a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    transition: 0.3s;
}

.nav-links a:hover {
    color: cyan;
}

.hero {
    text-align: center;
    padding: 120px 20px;
}

.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid cyan;
    margin-bottom: 20px;
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

.typing {
    color: cyan;
    font-size: 20px;
    height: 30px;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: cyan;
    color: black;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
}

button:hover {
    background: white;
    transform: scale(1.08);
}

section {
    padding: 100px 20px;
    text-align: center;
}

.cards-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
}

.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    padding: 25px;
    border-radius: 15px;
    width: 260px;
    transition: 0.4s;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
}

.project-img {
    width: 100%;
    height: 140px;
    background: #1e293b;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* Popup Modal */
.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.popup-content h3 {
    margin-bottom: 15px;
}

.popup-content button {
    margin-top: 15px;
}

</style>
</head>

<body>

<div class="navbar">
    <div><b>MyPortfolio</b></div>
    <div class="nav-links">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </div>
</div>

<section id="home" class="hero">
    <img src="C:\Users\lasan\OneDrive\Desktop\profile.png" class="profile-img">
    <h1>Hi, I'm Sizzy 👋</h1>
    <div class="typing" id="typing"></div>
    <button onclick="openPopup()">Hire Me</button>
</section>

<section id="about">
    <h2>About Me</h2>
    <div class="cards-container">
        <div class="card">
            Passionate about coding, AI, and building real-world projects 🚀
        </div>
    </div>
</section>

<section id="skills">
    <h2>Skills</h2>
    <div class="cards-container">
        <div class="card">HTML & CSS</div>
        <div class="card">JavaScript</div>
        <div class="card">Python & Pygame</div>
    </div>
</section>

<section id="projects">
    <h2>Projects</h2>
    <div class="cards-container">
        <div class="card">
            <div class="project-img"></div>
            Truck Simulator Game (Python)
        </div>
        <div class="card">
            <div class="project-img"></div>
            Portfolio Website
        </div>
    </div>
</section>

<!-- Popup Modal -->
<div id="popup" class="popup">
    <div class="popup-content">
        <h3>Contact Me 📩</h3>
        <p>Email:</p>
        <p><b>sithumchamathmina1@gmail.com</b></p>
        <button onclick="closePopup()">Close</button>
    </div>
</div>

<script>
// Typing animation
const text = ["Web Developer", "Programmer"];
let i = 0, j = 0, isDeleting = false;

function type() {
    const typing = document.getElementById("typing");
    const current = text[i];

    typing.innerHTML = current.substring(0, j);

    if (!isDeleting) {
        j++;
        if (j > current.length) {
            isDeleting = true;
            setTimeout(type, 1000);
            return;
        }
    } else {
        j--;
        if (j === 0) {
            isDeleting = false;
            i = (i + 1) % text.length;
        }
    }

    setTimeout(type, isDeleting ? 50 : 100);
}

type();

// Popup controls
function openPopup() {
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
